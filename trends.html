<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>环境参数趋势分析</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --green-main: #2f7d32;
      --green-dark: #256a29;
      --bg-main: #eef3ef;
      --text-main: #2b2b2b;
      --text-sub: #667085;
      --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --card-radius: 22px;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(180deg, #f3f6f4 0%, #edf3ef 100%);
      color: var(--text-main);
    }

    .hero {
      background: linear-gradient(135deg, var(--green-dark), #5fa567);
      color: #fff;
      text-align: center;
      padding: 30px 16px 24px;
      box-shadow: 0 4px 18px rgba(47, 125, 50, 0.25);
    }

    .hero h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
    }

    .hero p {
      margin: 12px 0 0;
      font-size: 17px;
      opacity: 0.95;
    }

    .wrapper {
      width: min(1240px, calc(100% - 32px));
      margin: 24px auto 30px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 22px;
      background: rgba(255,255,255,0.96);
      border-radius: 18px;
      box-shadow: var(--card-shadow);
      padding: 16px 20px;
    }

    .back-btn {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background: var(--green-main);
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
    }

    .desc {
      color: var(--text-sub);
      font-size: 15px;
      line-height: 1.7;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .chart-card {
      background: rgba(255,255,255,0.97);
      border-radius: 22px;
      box-shadow: var(--card-shadow);
      padding: 18px 18px 12px;
    }

    .chart-title {
      font-size: 20px;
      font-weight: 700;
      color: #355a3b;
      margin: 0 0 10px;
      padding-left: 6px;
    }

    .chart-box {
      width: 100%;
      height: 320px;
    }

    .note {
      margin-top: 24px;
      text-align: center;
      color: #5f6e63;
      font-size: 15px;
      line-height: 1.8;
    }

    @media (max-width: 900px) {
      .chart-grid {
        grid-template-columns: 1fr;
      }

      .chart-box {
        height: 290px;
      }
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: 24px;
      }

      .hero p {
        font-size: 15px;
      }

      .wrapper {
        width: calc(100% - 18px);
        margin: 16px auto 22px;
      }

      .top-bar {
        padding: 14px 14px;
      }

      .chart-title {
        font-size: 18px;
      }

      .chart-box {
        height: 260px;
      }

      .note {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <h1>环境参数趋势分析</h1>
    <p>智能大棚环境参数历史变化监测页面</p>
  </header>

  <main class="wrapper">
    <section class="top-bar">
      <a class="back-btn" href="index.html">← 返回首页</a>
      <div class="desc">
        温度与光照显示最近 5 天数据，湿度与土壤湿度显示最近 12 小时数据。<br>
        页面会根据当前时间自动更新时间横坐标。
      </div>
    </section>

    <section class="chart-grid">
      <div class="chart-card">
        <h3 class="chart-title">温度变化趋势图</h3>
        <div id="tempChart" class="chart-box"></div>
      </div>

      <div class="chart-card">
        <h3 class="chart-title">光照变化趋势图</h3>
        <div id="lightChart" class="chart-box"></div>
      </div>

      <div class="chart-card">
        <h3 class="chart-title">湿度变化趋势图</h3>
        <div id="humiChart" class="chart-box"></div>
      </div>

      <div class="chart-card">
        <h3 class="chart-title">土壤湿度变化趋势图</h3>
        <div id="soilChart" class="chart-box"></div>
      </div>
    </section>

    <div class="note">
      本页面用于展示智能大棚环境参数历史变化趋势，可通过电脑端和手机浏览器访问。
    </div>
  </main>

  <script>
    function getLastFiveDaysLabels() {
      const labels = [];
      const now = new Date();
      for (let i = 4; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(now.getDate() - i);
        labels.push(`${d.getMonth() + 1}/${d.getDate()}`);
      }
      return labels;
    }

    function getLastTwelveHoursLabels() {
      const labels = [];
      const now = new Date();
      for (let i = 11; i >= 0; i--) {
        const d = new Date(now);
        d.setHours(now.getHours() - i, 0, 0, 0);
        const h = String(d.getHours()).padStart(2, "0");
        labels.push(`${h}:00`);
      }
      return labels;
    }

    function randomData(length, min, max) {
      const arr = [];
      for (let i = 0; i < length; i++) {
        arr.push(Number((Math.random() * (max - min) + min).toFixed(1)));
      }
      return arr;
    }

    const tempChart = echarts.init(document.getElementById("tempChart"));
    const lightChart = echarts.init(document.getElementById("lightChart"));
    const humiChart = echarts.init(document.getElementById("humiChart"));
    const soilChart = echarts.init(document.getElementById("soilChart"));

    let tempData = randomData(5, 20, 30);
    let lightData = randomData(5, 600, 1800);
    let humiData = randomData(12, 35, 70);
    let soilData = randomData(12, 20, 65);

    function buildLineOption(title, xData, yData, color, unit) {
      return {
        tooltip: {
          trigger: "axis"
        },
        grid: {
          left: "10%",
          right: "6%",
          top: 30,
          bottom: 40
        },
        xAxis: {
          type: "category",
          data: xData,
          axisLine: { lineStyle: { color: "#7b8b7e" } },
          axisLabel: { color: "#55645a" }
        },
        yAxis: {
          type: "value",
          axisLine: { show: false },
          splitLine: { lineStyle: { color: "#e3e9e4" } },
          axisLabel: {
            color: "#55645a",
            formatter: `{value} ${unit}`
          }
        },
        series: [
          {
            data: yData,
            type: "line",
            smooth: true,
            symbol: "circle",
            symbolSize: 8,
            lineStyle: {
              width: 3,
              color: color
            },
            itemStyle: {
              color: color
            },
            areaStyle: {
              color: color + "22"
            }
          }
        ]
      };
    }

    function renderCharts() {
      const days = getLastFiveDaysLabels();
      const hours = getLastTwelveHoursLabels();

      tempChart.setOption(buildLineOption("温度变化趋势图", days, tempData, "#2f7d32", "℃"));
      lightChart.setOption(buildLineOption("光照变化趋势图", days, lightData, "#f4a62a", "lx"));
      humiChart.setOption(buildLineOption("湿度变化趋势图", hours, humiData, "#2b8cc4", "%"));
      soilChart.setOption(buildLineOption("土壤湿度变化趋势图", hours, soilData, "#8c6a4a", "%"));
    }

    renderCharts();

    // 每分钟检查一次横坐标是否需要更新
    setInterval(() => {
      renderCharts();
    }, 60000);

    window.addEventListener("resize", function () {
      tempChart.resize();
      lightChart.resize();
      humiChart.resize();
      soilChart.resize();
    });
  </script>
</body>
</html>
