<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生长参数推荐</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --green-main: #2f7d32;
      --green-dark: #256a29;
      --text-main: #2b2b2b;
      --text-sub: #667085;
      --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(180deg, #f3f6f4 0%, #edf3ef 100%);
      color: var(--text-main);
    }
    .hero {
      background: linear-gradient(135deg, var(--green-dark), #5fa567);
      color: #fff;
      text-align: center;
      padding: 30px 16px 24px;
    }
    .hero h1 {
      margin: 0;
      font-size: 30px;
    }
    .hero p {
      margin: 12px 0 0;
      font-size: 17px;
      opacity: 0.95;
    }
    .wrapper {
      width: min(1180px, calc(100% - 32px));
      margin: 24px auto 30px;
    }
    .top-bar, .panel, .card {
      background: rgba(255,255,255,0.97);
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    .top-bar {
      padding: 16px 20px;
      margin-bottom: 22px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .back-btn, .retry-btn {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background: #2f7d32;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    .retry-btn {
      background: #4d8f55;
    }
    .panel {
      padding: 22px 24px;
      margin-bottom: 22px;
    }
    .panel h3 {
      margin: 0 0 16px;
      color: #355a3b;
      font-size: 22px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      margin-bottom: 12px;
    }
    .label {
      font-size: 17px;
      color: #4e5e52;
      font-weight: 600;
    }
    select {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #cfd8d2;
      font-size: 16px;
      background: #fff;
    }
    .season-box {
      color: #256a29;
      font-size: 18px;
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }
    .card {
      padding: 24px 18px;
      text-align: center;
      min-height: 180px;
    }
    .icon {
      font-size: 30px;
      margin-bottom: 10px;
    }
    .title {
      font-size: 20px;
      font-weight: 700;
      color: #47604c;
      margin-bottom: 16px;
    }
    .value {
      font-size: 28px;
      font-weight: 800;
      color: #2f7d32;
      line-height: 1.5;
    }
    .desc {
      margin-top: 24px;
      text-align: center;
      color: #5f6e63;
      font-size: 15px;
      line-height: 1.8;
    }
    .status-box {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eef7ef;
      color: #256a29;
      font-weight: 700;
      font-size: 15px;
    }
    .weather-info {
      color: #4e5e52;
      font-size: 16px;
      line-height: 1.8;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 1000px) {

      .hero p { font-size: 15px; }
      .wrapper { width: calc(100% - 18px); }

      .value { font-size: 24px; }

      <div class="weather-info" id="weatherInfo">

        当前定位：--<br>
        数据来源：自动模式
      </div>
    </section>

    <section class="panel">
      <h3>农作物选择</h3>
      <div class="row">
        <span class="label">请选择农作物：</span>
        <select id="cropSelect">
          <option value="">请选择作物</option>
          <option value="tomato">番茄</option>
          <option value="cucumber">黄瓜</option>
          <option value="pepper">辣椒</option>
          <option value="lettuce">生菜</option>
          <option value="strawberry">草莓</option>
          <option value="eggplant">茄子</option>
          <option value="chinese_cabbage">白菜</option>
          <option value="celery">芹菜</option>
          <option value="spinach">菠菜</option>

          <option value="bean">豆角</option>
          <option value="watermelon">西瓜</option>
          <option value="grape">葡萄</option>
          <option value="cabbage">甘蓝</option>
          <option value="onion">洋葱</option>
        </select>
      </div>
    </section>

    <section class="panel hidden" id="manualPanel">
      <h3>手动选择天气（定位失败时使用）</h3>
      <div class="row">
        <span class="label">请选择当天天气：</span>
        <select id="weatherSelect">
          <option value="">请选择天气</option>
          <option value="sunny">晴天</option>
          <option value="cloudy">多云</option>

          <option value="rainy">雨天</option>
          <option value="hot">高温</option>
          <option value="cold">低温</option>
        </select>
      </div>
    </section>

    <section class="grid">
      <div class="card">
        <div class="icon">🌡️</div>
        <div class="title">推荐温度</div>
        <div class="value" id="tempRec">--</div>
      </div>

      <div class="card">
        <div class="icon">💧</div>
        <div class="title">推荐湿度</div>
        <div class="value" id="humiRec">--</div>
      </div>

      <div class="card">
        <div class="icon">☀️</div>
        <div class="title">推荐光照</div>
        <div class="value" id="lightRec">--</div>
      </div>

      <div class="card">
        <div class="icon">🌱</div>
        <div class="title">推荐土壤湿度</div>
        <div class="value" id="soilRec">--</div>
      </div>
    </section>

      推荐参数只有在成功获取天气并选择作物后才会显示。
    </div>
  </main>

    function clearRecommendation() {
      tempRec.textContent = "--";
      humiRec.textContent = "--";
      lightRec.textContent = "--";
      soilRec.textContent = "--";
    }

    function renderRecommendation() {
      const crop = cropSelect.value;

      if (!weatherReady || !currentWeatherType || !crop) {
        clearRecommendation();
        return;
      }

      const rec = recommendationData[crop][season][currentWeatherType];
      tempRec.textContent = rec.temp;
      humiRec.textContent = rec.humi;
      lightRec.textContent = rec.light;
      soilRec.textContent = rec.soil;
    }

    function weatherCodeToType(code, tempMax) {
      if ([61, 63, 65, 80, 81, 82, 51, 53, 55].includes(code)) return "rainy";
      if ([0].includes(code)) {
        if (tempMax >= 32) return "hot";
        if (tempMax <= 10) return "cold";
        return "sunny";
      }
      if ([1, 2].includes(code)) {
        if (tempMax >= 32) return "hot";
        if (tempMax <= 10) return "cold";
        return "cloudy";
      }
      if ([3, 45, 48].includes(code)) return "overcast";
      if (tempMax >= 32) return "hot";
      if (tempMax <= 10) return "cold";
      return "cloudy";
    }

    function weatherTypeText(type) {
      const map = {
        sunny: "晴天",
        cloudy: "多云",
        overcast: "阴天",
        rainy: "雨天",
        hot: "高温",
        cold: "低温"
      };
      return map[type] || "未知";
    }

    async function fetchWeather(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weather_code,temperature_2m_max&timezone=auto&forecast_days=1`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("天气接口请求失败");
      return await res.json();
    }

    async function reverseGeocode(lat, lon) {
      const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=zh-CN`;

      const res = await fetch(url, {
        headers: {
          "Accept": "application/json"
        }
      });

      if (!res.ok) throw new Error("位置解析失败");

      const data = await res.json();
      const addr = data.address || {};

      const province = addr.state || "";
      const city = addr.city || addr.town || addr.county || "";
      const district = addr.suburb || addr.city_district || addr.county || "";
      const road = addr.road || addr.neighbourhood || "";

      let locationText = [province, city, district, road].filter(Boolean).join("");

      if (!locationText) {
        locationText = data.display_name || `纬度 ${lat.toFixed(4)}，经度 ${lon.toFixed(4)}`;
      }

      return locationText;
    }

    function saveWeatherCache(weatherType, lat, lon, locationText) {
      const cache = {
        weatherType,
        lat,
        lon,
        locationText,
        time: Date.now()
      };
      localStorage.setItem("greenhouse_weather_cache", JSON.stringify(cache));
    }

    function loadWeatherCache() {
      const cache = localStorage.getItem("greenhouse_weather_cache");
      if (!cache) return null;
      try {
        return JSON.parse(cache);
      } catch {
        return null;
      }
    }

    function enableManualMode(message) {
      statusText.textContent = message;
      weatherInfo.innerHTML = `当前天气：请手动选择<br>当前定位：未获取<br>数据来源：手动模式`;
      manualPanel.classList.remove("hidden");
      currentWeatherType = "";
      weatherReady = false;
      clearRecommendation();
    }

    async function handleAutoWeather(lat, lon) {
      statusText.textContent = "正在获取今日天气与当前位置...";

      const [weatherData, locationText] = await Promise.all([
        fetchWeather(lat, lon),
        reverseGeocode(lat, lon)
      ]);

      const code = weatherData.daily.weather_code[0];
      const tempMax = weatherData.daily.temperature_2m_max[0];
      const weatherType = weatherCodeToType(code, tempMax);

      currentWeatherType = weatherType;
      weatherReady = true;

      saveWeatherCache(weatherType, lat, lon, locationText);

      statusText.textContent = "已自动获取今日天气";
      weatherInfo.innerHTML = `
        当前天气：${weatherTypeText(weatherType)}<br>
        当前定位：${locationText}<br>
        数据来源：自动定位获取
      `;
      renderRecommendation();
    }

    function useCacheMode(cache) {
      currentWeatherType = cache.weatherType;
      weatherReady = true;
      statusText.textContent = "自动获取失败，已使用上次天气结果";
      weatherInfo.innerHTML = `
        当前天气：${weatherTypeText(cache.weatherType)}<br>
        当前定位：${cache.locationText || `纬度 ${cache.lat.toFixed(4)}，经度 ${cache.lon.toFixed(4)}`}<br>
        数据来源：缓存模式
      `;
      renderRecommendation();
    }

    async function locateFastThenRetry() {
      const cache = loadWeatherCache();
      weatherReady = false;
      currentWeatherType = "";
      clearRecommendation();

      if (!navigator.geolocation) {
        if (cache) {
          useCacheMode(cache);
        } else {
          enableManualMode("当前浏览器不支持定位，已切换手动模式");
        }
        return;
      }

      const successHandler = async (position) => {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        try {
          await handleAutoWeather(lat, lon);
        } catch (error) {
          console.error(error);
          if (cache) {
            useCacheMode(cache);
          } else {
            enableManualMode("天气获取失败，请手动选择天气后再选择作物");
          }
        }
      };

      const fallbackToCacheOrManual = (message) => {
        if (cache) {
          useCacheMode(cache);
        } else {
          enableManualMode(message);
        }
      };

      navigator.geolocation.getCurrentPosition(
        successHandler,
        () => {
          navigator.geolocation.getCurrentPosition(
            successHandler,
            () => {
              let watchId = null;
              let finished = false;

              const finishWithError = () => {
                if (finished) return;
                finished = true;
                if (watchId !== null) navigator.geolocation.clearWatch(watchId);
                fallbackToCacheOrManual("定位失败，请手动选择天气后再选择作物");
              };

              watchId = navigator.geolocation.watchPosition(
                (position) => {
                  if (finished) return;
                  finished = true;
                  navigator.geolocation.clearWatch(watchId);
                  successHandler(position);
                },
                () => {},
                {
                  enableHighAccuracy: true,
                  timeout: 15000,
                  maximumAge: 0
                }
              );

              setTimeout(finishWithError, 12000);
            },
            {
              enableHighAccuracy: true,
              timeout: 12000,
              maximumAge: 0
            }
          );
        },
        {
          enableHighAccuracy: false,
          timeout: 5000,
          maximumAge: 600000
        }
      );
    }

    cropSelect.addEventListener("change", function () {
      renderRecommendation();
    });

    weatherSelect.addEventListener("change", function () {
      if (weatherSelect.value) {
        currentWeatherType = weatherSelect.value;
        weatherReady = true;
      } else {
        currentWeatherType = "";
        weatherReady = false;
      }
      renderRecommendation();
    });

    retryBtn.addEventListener("click", function () {
      statusText.textContent = "正在重新获取当前位置...";
      locateFastThenRetry();
    });

    clearRecommendation();
    locateFastThenRetry();
  </script>
